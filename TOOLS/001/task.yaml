id: TOOLS-001
title: "Find all Python files and report their sizes"
category: tools
difficulty: easy
prompt: |
  The workspace contains a directory tree with various files. Your task is to
  find every Python file (.py extension) anywhere in this task directory and report
  each file's path and size.

  Your task:
  1. Search this task directory recursively for files ending in .py
  2. For each file found, record its path (relative to this task directory)
     and its size in bytes
  3. Sort the results by file path alphabetically
  4. Write the results to results/py_files.txt, one file per line in this
     exact format:

     <relative-path>: <size> bytes

  Example:
     scripts/hello.py: 142 bytes
     utils/helper.py: 87 bytes

  Do not include directories, only files.
verification:
  timeout: 120
  judge_prompt: |
    The agent was asked to find all .py files recursively in the task directory,
    then write results/py_files.txt listing each file's relative path and size in
    bytes, sorted alphabetically, in the format:
      <relative-path>: <size> bytes

    Score the agent 0-100:
      100 = file exists, all .py files listed with correct paths and sizes
      50-99 = file exists but a path or size is slightly wrong
      1-49 = file exists but most entries are wrong or missing
      0 = file missing or task not attempted
permissions:
  mode: "dontAsk"
  write: true
  bash: true
  read: true
  web_fetch: false
metadata:
  tags:
    - file-search
    - glob
    - tools
    - beginner
