id: CODING-002
title: "Parse a log file and extract error counts"
category: coding
difficulty: medium
prompt: |
  There is a server log file at data/server.log in the workspace.
  Each line has the format:

    [LEVEL] YYYY-MM-DD HH:MM:SS message text

  Where LEVEL is one of: INFO, WARN, ERROR

  Your task:
  1. Read data/server.log
  2. Count the number of lines for each log level (INFO, WARN, ERROR)
  3. Write the counts to results/log_summary.txt in this exact format:

    INFO: <count>
    WARN: <count>
    ERROR: <count>

  The counts must be in that order. Do not include any other lines.
verification:
  timeout: 120
  judge_prompt: |
    The agent was asked to count log levels in a server log file and write
    results/log_summary.txt in this exact format (with the correct counts):
      INFO: <count>
      WARN: <count>
      ERROR: <count>

    The correct counts are INFO: 30, WARN: 6, ERROR: 4.

    Score the agent 0-100:
      100 = file exists with all three counts exactly correct and in the right format
      50-99 = file exists but one count is wrong or format slightly off
      1-49 = file exists but multiple counts are wrong
      0 = file missing or task not attempted
permissions:
  mode: "dontAsk"
  write: true
  bash: true
  read: true
  web_fetch: false
metadata:
  tags:
    - python
    - file-reading
    - text-processing
    - intermediate
