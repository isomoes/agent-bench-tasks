id: WRITING-003
title: "Write a 5-point pros/cons list"
category: writing
difficulty: medium
prompt: |
  Write a balanced pros and cons list about remote work and save it to a file.

  Your task:
  1. Write exactly 5 pros (advantages) of remote work
  2. Write exactly 5 cons (disadvantages) of remote work
  3. Each point must be a concise sentence (10–30 words)
  4. Write the result to: results/pros_cons.txt

  Required format (use these exact section headers):
    Pros:
    - <point 1>
    - <point 2>
    - <point 3>
    - <point 4>
    - <point 5>

    Cons:
    - <point 1>
    - <point 2>
    - <point 3>
    - <point 4>
    - <point 5>
verification:
  timeout: 120
  judge_prompt: |
    The agent was asked to write a pros/cons list about remote work in
    results/pros_cons.txt with exactly 5 pros and 5 cons, each a concise sentence
    of 10-30 words, using these exact headers:
      Pros:
      - <point>
      Cons:
      - <point>

    Score the agent 0-100:
      100 = file exists, correct headers, exactly 5 pros and 5 cons, each point
            10-30 words, well-written and balanced
      70-99 = file exists but minor issues (e.g. one point slightly outside word range
              or a point is weak)
      1-69 = file exists but wrong number of points or headers missing
      0 = file missing or task not attempted
permissions:
  mode: "dontAsk"
  write: true
  bash: false
  read: true
  web_fetch: false
metadata:
  tags:
    - writing
    - structured
    - intermediate
